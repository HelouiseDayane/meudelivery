# Cache do Redis para Nginx
upstream redis_backend {
    server redis:6379;
    keepalive 32;
}

# Upstream do PHP-FPM
upstream php_backend {
    server app:9000;
    keepalive 32;
}

# Cache zones
proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m max_size=1g inactive=60m use_temp_path=off;

server {
    listen 80;
    server_name localhost _;
    root /var/www/html/public;
    index index.php index.html index.htm;

    # Configurações de segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # Logs específicos
    access_log /var/log/nginx/brunocakes_access.log main;
    error_log /var/log/nginx/brunocakes_error.log;

    # Cache para arquivos estáticos
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        
        # Otimização para imagens
        location ~* \.(jpg|jpeg|png|gif)$ {
            expires 30d;
            add_header Cache-Control "public";
        }
    }

    # API routes com cache e rate limiting
    location ^~ /api/ {
        # Rate limiting
        limit_req zone=api burst=200 nodelay;
        limit_req_status 429;

        # Headers para API
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

        # Cache para GET requests
        proxy_cache api_cache;
        proxy_cache_valid 200 302 5m;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status always;

        try_files $uri $uri/ /index.php?$query_string;
    }

    # Login/Auth com rate limiting especial
    location ^~ /api/auth/ {
        limit_req zone=login burst=10 nodelay;
        limit_req_status 429;
        
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Rota principal do Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM configuration
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php_backend;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Configurações de buffer para performance
        fastcgi_buffering on;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
        fastcgi_max_temp_file_size 2048m;

        # Timeouts
        fastcgi_connect_timeout 300s;
        fastcgi_send_timeout 300s;
        fastcgi_read_timeout 300s;
    }

    # Negar acesso a arquivos sensíveis
    location ~ /\. {
        deny all;
    }

    location ~ /\.ht {
        deny all;
    }

    location ~ /composer\.(json|lock) {
        deny all;
    }

    location ~ /package\.(json|lock) {
        deny all;
    }

    # Status do Nginx (opcional para monitoramento)
    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        deny all;
    }
}