# Configuração de Logging para Docker Compose
version: "3.8"

# Configurações padrão de logging
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    labels: "brunocakes.service"

# Para ser usado nos serviços do docker-compose.yml
# Adicione em cada serviço:
# logging: *default-logging

# Configurações específicas por serviço:

# Para aplicação principal (mais logs)
x-app-logging: &app-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"
    labels: "brunocakes.service,brunocakes.type=app"

# Para filas (logs detalhados para debugging)
x-queue-logging: &queue-logging
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "7"
    labels: "brunocakes.service,brunocakes.type=queue"

# Para banco de dados (logs básicos)
x-db-logging: &db-logging
  driver: "json-file"
  options:
    max-size: "25m"
    max-file: "3"
    labels: "brunocakes.service,brunocakes.type=database"

# Para cache/redis (logs mínimos)
x-cache-logging: &cache-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "2"
    labels: "brunocakes.service,brunocakes.type=cache"