[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:php-fpm]
command=php-fpm
autostart=true
autorestart=true
priority=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopsignal=QUIT

[program:laravel-queue-default]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/html/artisan queue:work --sleep=3 --tries=3 --max-time=3600 --memory=512
directory=/var/www/html
autostart=true
autorestart=true
startretries=3
user=www
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/queue-default.log
stopwaitsecs=3600
stopasgroup=true
killasgroup=true

[program:laravel-queue-high]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/html/artisan queue:work --queue=high --sleep=1 --tries=3 --max-time=1800 --memory=512
directory=/var/www/html
autostart=true
autorestart=true
startretries=3
user=www
numprocs=3
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/queue-high.log
stopwaitsecs=1800
stopasgroup=true
killasgroup=true

[program:laravel-queue-background]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/html/artisan queue:work --queue=background --sleep=5 --tries=5 --max-time=7200 --memory=512
directory=/var/www/html
autostart=true
autorestart=true
startretries=3
user=www
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/queue-background.log
stopwaitsecs=7200
stopasgroup=true
killasgroup=true

[program:laravel-schedule]
command=/bin/bash -c "while [ true ]; do (php /var/www/html/artisan schedule:run --verbose --no-interaction &); sleep 60; done"
directory=/var/www/html
autostart=true
autorestart=true
startretries=3
user=www
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/schedule.log
stderr_logfile=/var/www/html/storage/logs/schedule.log

[program:laravel-horizon]
command=php /var/www/html/artisan horizon
directory=/var/www/html
autostart=true
autorestart=true
startretries=3
user=www
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/horizon.log
stderr_logfile=/var/www/html/storage/logs/horizon.log
stopwaitsecs=3600
killasgroup=true

[group:laravel-queues]
programs=laravel-queue-default,laravel-queue-high,laravel-queue-background
priority=999