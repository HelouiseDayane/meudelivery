# Configurações de performance para alto tráfego
memory_limit = 512M
upload_max_filesize = 100M
post_max_size = 100M
max_execution_time = 300
max_input_time = 300
max_input_vars = 3000

# OPcache para melhor performance
opcache.enable=1
opcache.enable_cli=1
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.validate_timestamps=0
opcache.save_comments=1
opcache.fast_shutdown=1

# APCu configurações
apc.enabled=1
apc.shm_size=64M
apc.ttl=7200
apc.enable_cli=1

# Configurações de sessão
session.save_handler=redis
session.save_path="tcp://redis:6379?auth=redis_secure_pass"
session.gc_maxlifetime=3600

# Configurações de erro (production)
display_errors=Off
log_errors=On
error_log=/var/log/php_errors.log

# Timezone
date.timezone=America/Sao_Paulo

# Realpath cache para melhor performance
realpath_cache_size=4096K
realpath_cache_ttl=600