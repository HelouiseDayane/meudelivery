# Configuração Redis otimizada para alto tráfego com Jobs

# Configurações de rede
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Configurações de memória
maxmemory 1024mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# Configurações de persistência otimizadas para jobs
# AOF para garantir que jobs não se percam
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB para backup
save 900 1
save 300 10
save 60 10000

# Configurações de performance
databases 16
always-show-logo no

# Configurações de logging
loglevel notice
logfile ""

# Configurações de cliente (aumentado para jobs)
maxclients 20000

# Configurações de segurança
requirepass redis_secure_pass

# Configurações de performance avançadas
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000
stream-node-max-bytes 4096
stream-node-max-entries 100

# Configurações de threading (Redis 6+)
io-threads 8
io-threads-do-reads yes

# Lazy freeing
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes

# Configurações de notificação de eventos (para jobs e cache invalidation)
notify-keyspace-events ExA

# Configurações de compressão
activerehashing yes

# Configurações de slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Configurações de latência
latency-monitor-threshold 100

# Configurações específicas para Laravel Queues
# Aumentar o timeout para jobs longos
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60