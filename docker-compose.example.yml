version: '3.8'

services:
  # Redis próprio do seu_delivery
  seu_delivery_redis:
    image: redis:7.2
    container_name: seu_delivery_redis
    restart: always
    command: ["redis-server", "--requirepass", "seudelivery_redis_2026"]
    networks:
      - internal

  # Backend API
  seu_delivery_backend:
    build: ./seu_delivery_backend
    container_name: seu_delivery_backend
    restart: always
    environment:
      APP_URL: http://seu_delivery_backend:80
      APP_ENV: production
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: seu_delivery
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: seu_delivery_redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      EVOLUTION_API_URL: http://172.19.0.6:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
    volumes:
      - seu_delivery_vendor:/var/www/html/vendor
      - ./seu_delivery_backend/storage:/var/www/html/storage
      - ./docker/php.ini:/usr/local/etc/php/conf.d/custom.ini
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "php", "-r", "echo 'ok';"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal
      - self-hosting01

  # Queue Worker
  seu_delivery_queue:
    build: ./seu_delivery_backend
    container_name: seu_delivery_queue
    restart: always
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3"]
    depends_on:
      - seu_delivery_backend
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: seu_delivery
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: seu_delivery_redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - internal
      - self-hosting01

  # Frontend - Modo Desenvolvimento (Vite + Nginx Proxy)
  seu_delivery_frontend_dev:
    build:
      context: ./seu_delivery_front
      dockerfile: Dockerfile.dev
    container_name: seu_delivery_frontend_dev
    restart: always
    ports:
      - "8886:8080"
      - "8887:8081"
    environment:
      VITE_API_BASE_URL: /api
      VITE_DOMAIN_BASE_URL: ""
    volumes:
      - ./seu_delivery_front:/app
      - /app/node_modules
    depends_on:
      - seu_delivery_backend
    networks:
      - internal
      - self-hosting01

  # Frontend - Produção (Build com Nginx)
  seu_delivery_frontend_prod:
    build:
      context: ./seu_delivery_front
      dockerfile: Dockerfile
    container_name: seu_delivery_frontend_prod
    restart: always
    ports:
      - "9998:80"
    depends_on:
      - seu_delivery_backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal
      - self-hosting01

networks:
  internal:
    driver: bridge
  self-hosting01:
    driver: bridge
    external: true

volumes:
  seu_delivery_vendor:
