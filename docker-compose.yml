version: "3.8"

services:
  # Backend Laravel
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: brunocakes_app
    restart: always
    healthcheck:
      test: ["CMD", "php", "artisan", "inspire"]
      interval: 30s
      timeout: 10s
      retries: 3
    working_dir: /var/www/html
    volumes:
      - ./brunocakes_backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-custom.ini
    depends_on:
      - db
      - redis
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=brunocakes
      - DB_USERNAME=brunocakes
      - DB_PASSWORD=brunocakes_secure_pass
      - REDIS_HOST=redis
      - REDIS_PASSWORD=redis_secure_pass
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    networks:
      - brunocakes_network

  # Frontend React
  frontend:
    build:
      context: ./docker/node
      dockerfile: Dockerfile
    container_name: brunocakes_frontend
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    working_dir: /usr/src/app
    volumes:
      - ./brunocakes_front_v3:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - FAST_REFRESH=true
    depends_on:
      - app
    networks:
      - brunocakes_network

  # Nginx Web Server
  webserver:
    image: nginx:1.25-alpine
    container_name: brunocakes_nginx
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/nginx_status"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./brunocakes_backend:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/sites/:/etc/nginx/conf.d/
      - ./docker/nginx/ssl:/etc/ssl/certs
    depends_on:
      - app
    networks:
      - brunocakes_network

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: brunocakes_mysql
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "brunocakes", "-pbrunocakes_secure_pass"]
      interval: 30s
      timeout: 10s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root_secure_pass
      MYSQL_DATABASE: brunocakes
      MYSQL_USER: brunocakes
      MYSQL_PASSWORD: brunocakes_secure_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - brunocakes_network

  # Redis Cache & Sessions - ULTRA OTIMIZADO PARA ALTO TRÁFEGO
  redis:
    image: redis:7.2-alpine
    container_name: brunocakes_redis
    restart: always
    # Health check para garantir que Redis responde
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secure_pass", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Configuração customizada para máxima performance
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    volumes:
      # Persistência de dados para não perder jobs/sessões
      - redis_data:/data
      # Configuração otimizada:
      # - 1GB RAM dedicada
      # - 8 threads IO para alta concorrência
      # - 20.000 conexões simultâneas
      # - AOF + RDB para durabilidade de jobs
      # - Keyspace notifications para Laravel
      # - Lazy freeing para performance
      # - Latency monitoring ativo
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    # Variáveis de ambiente para monitoramento
    environment:
      - REDIS_MAXMEMORY=1024mb
      - REDIS_POLICY=allkeys-lru
    networks:
      - brunocakes_network

  # Queue Worker (para processar jobs em background)
  queue:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: brunocakes_queue
    restart: always
    working_dir: /var/www/html
    volumes:
      - ./brunocakes_backend:/var/www/html
    depends_on:
      - db
      - redis
    environment:
      - APP_ENV=production
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=brunocakes
      - DB_USERNAME=brunocakes
      - DB_PASSWORD=brunocakes_secure_pass
      - REDIS_HOST=redis
      - REDIS_PASSWORD=redis_secure_pass
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600 --memory=512 --timeout=300
    healthcheck:
      test: ["CMD", "ps", "aux", "|", "grep", "[q]ueue:work"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - brunocakes_network

  # Schedule Worker (para executar comandos agendados)
  schedule:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: brunocakes_schedule
    restart: always
    working_dir: /var/www/html
    volumes:
      - ./brunocakes_backend:/var/www/html
    depends_on:
      - db
      - redis
    environment:
      - APP_ENV=production
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=brunocakes
      - DB_USERNAME=brunocakes
      - DB_PASSWORD=brunocakes_secure_pass
      - REDIS_HOST=redis
      - REDIS_PASSWORD=redis_secure_pass
      - REDIS_PORT=6379
    command: sh -c "while true; do php artisan schedule:run >> /var/log/cron.log 2>&1; sleep 60; done"
    healthcheck:
      test: ["CMD", "ps", "aux", "|", "grep", "[s]chedule:run"]
      interval: 60s
      timeout: 10s
      retries: 3
    networks:
      - brunocakes_network

  # Multiple Queue Workers para alta demanda
  queue-high:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: brunocakes_queue_high
    restart: always
    working_dir: /var/www/html
    volumes:
      - ./brunocakes_backend:/var/www/html
    depends_on:
      - db
      - redis
    environment:
      - APP_ENV=production
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=brunocakes
      - DB_USERNAME=brunocakes
      - DB_PASSWORD=brunocakes_secure_pass
      - REDIS_HOST=redis
      - REDIS_PASSWORD=redis_secure_pass
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    command: php artisan queue:work --queue=high --sleep=1 --tries=3 --max-time=1800 --memory=512
    healthcheck:
      test: ["CMD", "ps", "aux", "|", "grep", "[q]ueue:work"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - brunocakes_network

  # Background Jobs Worker
  queue-background:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: brunocakes_queue_background
    restart: always
    working_dir: /var/www/html
    volumes:
      - ./brunocakes_backend:/var/www/html
    depends_on:
      - db
      - redis
    environment:
      - APP_ENV=production
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=brunocakes
      - DB_USERNAME=brunocakes
      - DB_PASSWORD=brunocakes_secure_pass
      - REDIS_HOST=redis
      - REDIS_PASSWORD=redis_secure_pass
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    command: php artisan queue:work --queue=background --sleep=5 --tries=5 --max-time=7200 --memory=512
    healthcheck:
      test: ["CMD", "ps", "aux", "|", "grep", "[q]ueue:work"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - brunocakes_network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  brunocakes_network:
    driver: bridge