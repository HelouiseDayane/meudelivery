services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_DATABASE: brunocakes
      MYSQL_USER: brunocakes
      MYSQL_PASSWORD: brunocakes145236521478214821782171285742557
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3310:3306"
    volumes:
      - ./docker/my.cnf:/etc/mysql/my.cnf
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7.2
    container_name: redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--requirepass", "cakes12345671571285415715715785421478214782171285742557"]
    ports:
      - "6380:6379"
    volumes:
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "cakes12345671571285415715715785421478214782171285742557", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: always

  backend:
    build: ./brunocakes_backend
    container_name: backend
    restart: always
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: brunocakes
      DB_USERNAME: brunocakes
      DB_PASSWORD: brunocakes145236521478214821782171285742557
      REDIS_HOST: redis
      REDIS_PASSWORD: cakes12345671571285415715715785421478214782171285742557
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
    volumes:
      - ./brunocakes_backend:/var/www/html
      - ./docker/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8191:80"
    healthcheck:
      test: ["CMD", "php", "-r", "echo 'ok';"]
      interval: 30s
      timeout: 5s
      retries: 3

  queue:
    build: ./brunocakes_backend
    container_name: queue
    restart: always
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3"]
    depends_on:
      - backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: brunocakes
      DB_USERNAME: brunocakes
      DB_PASSWORD: brunocakes145236521478214821782171285742557
      REDIS_HOST: redis
      REDIS_PASSWORD: cakes12345671571285415715715785421478214782171285742557

  frontend:
    build: ./brunocakes_front_v3
    container_name: frontend
    restart: always
    ports:
      - "3210:3000"
    environment:
      VITE_PORT: 3000 # Se quiser passar para Vite via env

volumes:
  mysql_data:
  redis_data: