version: '3.8'

services:
  # Database
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_DATABASE: brunocakes
      MYSQL_USER: brunocakes
      MYSQL_PASSWORD: brunocakes145236521478214821782171285742557
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - ./docker/my.cnf:/etc/mysql/my.cnf
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal

  # Cache/Session
  redis:
    image: redis:7.2
    container_name: redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--requirepass", "cakes12345671571285415715715785421478214782171285742557"]
    ports:
      - "6379:6379"
    volumes:
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "cakes12345671571285415715715785421478214782171285742557", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: always
    networks:
      - internal

  # Backend API (apenas rede interna - SEM exposi\u00e7\u00e3o externa)
  backend:
    build: ./brunocakes_backend
    container_name: backend
    restart: always
    environment:
      APP_URL: http://backend:80
      APP_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: brunocakes
      DB_USERNAME: brunocakes
      DB_PASSWORD: brunocakes145236521478214821782171285742557
      REDIS_HOST: redis
      REDIS_PASSWORD: cakes12345671571285415715715785421478214782171285742557
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
    volumes:
      - ./brunocakes_backend:/var/www/html
      - ./docker/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "80"
    # Porta removida - backend acess\u00edvel APENAS internamente pelos frontends
    healthcheck:
      test: ["CMD", "php", "-r", "echo 'ok';"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal

  # Queue Worker
  queue:
    build: ./brunocakes_backend
    container_name: queue
    restart: always
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3"]
    depends_on:
      - backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: brunocakes
      DB_USERNAME: brunocakes
      DB_PASSWORD: brunocakes145236521478214821782171285742557
      REDIS_HOST: redis
      REDIS_PASSWORD: cakes12345671571285415715715785421478214782171285742557
    networks:
      - internal

  # Frontend - Modo Desenvolvimento (Vite + Nginx Proxy)
  frontend-dev:
    build:
      context: ./brunocakes_front_v3
      dockerfile: Dockerfile.dev
    container_name: frontend-dev
    restart: always
    ports:
      - "8888:8080"  # Porta do Nginx, não do Vite
    environment:
      VITE_API_BASE_URL: /api
      VITE_DOMAIN_BASE_URL: ""
    volumes:
      - ./brunocakes_front_v3:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - internal

  # Frontend - Produção (Build com Nginx)
  frontend-prod:
    build:
      context: ./brunocakes_front_v3
      dockerfile: Dockerfile
    container_name: frontend-prod
    restart: always
    ports:
      - "9999:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
