
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" id="meta-description" content="" />
    <meta name="theme-color" content="#228B22" />
    <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/x-icon" href="/icone-selobrunocakes.ico" />
  <title id="dynamic-title"></title>
  <script>
    // Preenche dinamicamente o título e descrição usando storeSettings
    fetch('http://localhost:8191/api/store/settings')
      .then(res => res.json())
      .then(data => {
        document.title = `${data.store_name}${data.store_slogan ? ' - ' + data.store_slogan : ''}`;
        document.getElementById('dynamic-title').textContent = document.title;
        document.getElementById('meta-description').setAttribute('content', `${data.store_name}${data.store_slogan ? ' - ' + data.store_slogan : ''} A melhor doceria da cidade.`);
      });
  </script>

  <script type="module" crossorigin src="/assets/index-BCPJtEbs.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-CPnmURed.css">

  <body>
    <div id="root"></div>
  </body>
</html>
